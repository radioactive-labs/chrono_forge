name: Deploy landing page to Pages

on:
  # Runs on pushes to the default branch that touch the site.
  push:
    branches: [main]
    paths:
      - "site/**"
      - ".github/workflows/pages.yml"

  # Allows running this workflow manually from the Actions tab.
  workflow_dispatch:

# Grant GITHUB_TOKEN the permissions required to deploy to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

# No build step: the page is a single static file. Upload site/ and deploy it.
jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Stage dashboard screenshots
        # Single source of truth lives in the dashboard gem; copy it into the
        # artifact at build time rather than duplicating the images in site/.
        run: |
          mkdir -p site/screenshots
          cp chrono_forge-dashboard/docs/screenshots/*.png site/screenshots/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
